# ─────────────────────────────────────────────────────────────────────────────
# Vaultwarden → rootless Podman migration — shared config
# Edit these to match the Pi, then run 01 → 02 → 03 in order.
# Every value can also be overridden as an environment variable.
# ─────────────────────────────────────────────────────────────────────────────

# Name of the running Docker container today
VW_CONTAINER="${VW_CONTAINER:-vaultwarden}"

# Where the new rootless-podman home for vaultwarden lives (data + env file)
VW_NEW_HOME="${VW_NEW_HOME:-$HOME/vaultwarden}"

# Where backups are written (needs free space ≥ 2× the data dir)
VW_BACKUP_DIR="${VW_BACKUP_DIR:-$HOME/vw-migration-backups}"

# Prometheus base URL as reachable FROM THE PI ITSELF
VW_PROM_URL="${VW_PROM_URL:-http://127.0.0.1:9090}"

# The user-facing HTTPS URL served by Tailscale Serve (used for end-to-end
# checks and as the recommended new blackbox probe target).
# Example: https://pi5.tail1234.ts.net  or  https://vault.tail1234.ts.net
VW_TAILNET_URL="${VW_TAILNET_URL:-}"

# Path to the Homepage config dir on the Pi (services.yaml lives here).
# Leave empty to skip Homepage config checks.
VW_HOMEPAGE_CONFIG="${VW_HOMEPAGE_CONFIG:-}"

# Path to the docker compose file that defines vaultwarden (for stop/rollback
# hints). Leave empty if you manage the container with plain `docker run`.
VW_COMPOSE_FILE="${VW_COMPOSE_FILE:-}"

# Where scripts keep discovered state between steps (created by 01-precheck)
VW_STATE="${VW_STATE:-$(dirname "${BASH_SOURCE[0]}")/state/discovered.env}"
